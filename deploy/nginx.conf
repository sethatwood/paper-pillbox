# Paper Pillbox — nginx configuration for a static, backend-free deployment.
#
# Paste the marked block into the Forge site's Nginx config (Site → Edit Files
# → Edit Nginx Configuration), inside the existing `server` block that Forge
# generates for port 443. Forge owns everything else in that file.
#
# The site's Web Directory must be set to `/` (not the default `/public`),
# because index.html lives at the repository root.

# ---------------------------------------------------------------------------
# BEGIN Paper Pillbox
# ---------------------------------------------------------------------------

charset utf-8;
index index.html;

# The privacy promise, enforced rather than asserted.
#
# `connect-src 'none'` means the page cannot open a fetch, XHR, WebSocket, or
# sendBeacon to anywhere — including back to this server. A medication list
# physically cannot leave the browser. `script-src 'self'` (with no
# 'unsafe-inline') blocks inline event handlers, which is the exact shape of
# the stored-XSS payload this app was hardened against; the CSP is a second
# lock on that door. `style-src 'self'` holds only because the app carries no
# inline styles: the @page orientation rule is written through CSSOM.
add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;

# No `preload`: that ships this domain in a browser registry and is painful to
# undo the first time you want a plain-HTTP staging subdomain.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# No secrets here — the repo is public — but a web root is not a git remote.
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}
location ^~ /deploy/ {
    deny all;
    access_log off;
    log_not_found off;
}

# Fonts and images are content-addressed by name and effectively immutable.
location ~* \.(woff2|png|svg|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    # add_header drops inherited headers once redeclared in a block, so the
    # security headers must be repeated wherever a new one is added.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    try_files $uri =404;
}

# index.html, app.js and styles.css carry no cache-busting hash. `no-cache`
# still allows a 304, but guarantees a fix reaches a caregiver on next load
# rather than whenever a stale copy happens to expire.
location ~* \.(html|js|css|json|xml|txt)$ {
    add_header Cache-Control "no-cache" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    try_files $uri =404;
}

gzip on;
gzip_types text/plain text/css application/javascript image/svg+xml application/xml;
gzip_min_length 512;

# ---------------------------------------------------------------------------
# END Paper Pillbox
# ---------------------------------------------------------------------------


