# Paper Pillbox — nginx configuration for a static, backend-free deployment.
#
# Written against a real Laravel Forge "Static HTML" site. Forge generates
# /etc/nginx/sites-available/<domain> and owns it; what you edit through
# Site -> Edit Files -> Edit Nginx Configuration is the `site.conf` include,
# whose contents land *inside* the server block.
#
# Two blocks, two homes, because nginx will not accept them in one place:
#
#   PART 1  ->  /etc/nginx/conf.d/paperpillbox-privacy.conf   (create over SSH)
#               `map` and `log_format` are only valid in the http context.
#
#   PART 2  ->  Forge's "Edit Nginx Configuration" for the site
#               Everything here is inside the server block.
#
# Add PART 1 first. PART 2 references the `privacy` log format and the
# `$pp_cache` variable; without them, `nginx -t` fails and Forge refuses to
# reload.
#
# Leave the site's Web Directory at Forge's default, `/public`. Only files a
# browser should fetch live there; .git, these notes and the README sit above
# the web root, where nginx cannot serve them by accident.


# ===========================================================================
# PART 1 — /etc/nginx/conf.d/paperpillbox-privacy.conf
# ===========================================================================
#
# Access logging that does not retain visitor IP addresses.
#
# A visit to a medication-charting tool is a health inference about a real
# person. We want to know how many people the tool reached; we do not want a
# file on a server that says which households they were in. Truncating the
# final octet (and everything past the second IPv6 group) keeps country- and
# referrer-level analytics working while making the log useless for
# identifying anyone.
#
# The cost is honest: unique-visitor counts get slightly fuzzy, because
# everyone behind the same /24 collapses into one address.

map $remote_addr $ip_anonymous {
    ~(?P<octets>\d+\.\d+\.\d+)\.  $octets.0;
    ~(?P<group>[^:]+:[^:]+):      $group::;
    default                       0.0.0.0;
}

log_format privacy '$ip_anonymous - [$time_local] "$request" $status '
                   '$body_bytes_sent "$http_referer" "$http_user_agent"';

# Cache-Control chosen by content type.
#
# This is a map rather than a `location ~* \.(woff2|png)$` block on purpose.
# An add_header inside a location block silently discards every add_header
# inherited from the server — so a cache rule written that way would strip the
# CSP from exactly the assets it matched. Setting one variable at server level
# keeps all the headers on every response.
map $sent_http_content_type $pp_cache {
    default     "no-cache";   # index.html, app.js, styles.css carry no hash
    ~*^font/    "public, max-age=31536000, immutable";
    ~*^image/   "public, max-age=2592000";
}


# ===========================================================================
# PART 2 — Forge -> Site -> Edit Files -> Edit Nginx Configuration
# ===========================================================================
#
# Paste in place of the whole file. Preserve Forge's ssl_* lines, the
# `include forge-conf/<id>/server/*;` line, and the error_log path exactly as
# Forge wrote them — the site id differs per install.
#
#   ssl_protocols ...;            <- keep Forge's
#   ssl_ciphers ...;              <- keep Forge's
#   ssl_prefer_server_ciphers off;
#   ssl_dhparam /etc/nginx/dhparams.pem;

# The privacy promise, enforced rather than asserted.
#
# `connect-src 'none'` means the page cannot open a fetch, XHR, WebSocket or
# sendBeacon to anywhere — including back to this server. A medication list
# physically cannot leave the browser. `script-src 'self'` (with no
# 'unsafe-inline') blocks inline event handlers, which is the exact shape of
# the stored-XSS payload this app was hardened against; the CSP is a second
# lock on that door. `style-src 'self'` holds only because the app carries no
# inline styles: the @page orientation rule is written through CSSOM.
add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;

# No `preload`: that ships this domain in a browser registry and is painful to
# undo the first time you want a plain-HTTP staging subdomain.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Cache-Control $pp_cache always;

# Forge ships `add_header X-XSS-Protection "1; mode=block";`. Drop it. The
# header is deprecated, browsers ignore it, and its filter has historically
# introduced vulnerabilities of its own. The CSP above supersedes it.

index index.html index.htm;
charset utf-8;

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/<site-id>/server/*;   # keep Forge's own id here

location / {
    try_files $uri $uri/ =404;
}

location = /favicon.ico { access_log off; log_not_found off; }
location = /favicon.svg { access_log off; log_not_found off; }
location = /robots.txt  { access_log off; log_not_found off; }

# Forge writes `access_log off;` here. Replace it — do not add this line
# beneath it. `off` cancels EVERY access_log directive at the same level,
# whichever order they appear in, so leaving it in place logs nothing,
# silently, and the log file is never even created.
access_log /var/log/nginx/paperpillbox.com-access.log privacy;
error_log  /var/log/nginx/<site-id>-error.log error;

# With the web root at public/ there is nothing sensitive below this point to
# reach — that is the actual defence. Forge adds this rule anyway.
location ~ /\.(?!well-known).* {
    deny all;
}


# ===========================================================================
# A leak Forge leaves behind
# ===========================================================================
#
# Forge generates two extra server blocks for the redirects:
#
#   forge-conf/<id>/<domain>/before/ssl_redirect.conf   (http  -> https)
#   forge-conf/<id>/<domain>/before/redirect.conf       (www   -> apex)
#
# Neither declares an access_log, so both inherit nginx.conf's http-level
# `access_log /var/log/nginx/access.log;` — with full, untruncated IPs, into a
# log shared with every other site on the server. Anyone who types the bare
# domain or an old www link is recorded there before being redirected.
#
# Add `access_log off;` inside each of those two server blocks. Forge may
# rewrite them when a certificate is reissued, so re-check after any SSL
# operation.
